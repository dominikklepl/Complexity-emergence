<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z jednoduchého složité</title>

    <!-- Fonts (bundled locally for offline kiosk — latin + latin-ext for Czech) -->
    <link rel="stylesheet" href="/static/vendor/fonts/fonts.css">

    <!-- KaTeX (bundled locally) -->
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <script defer src="/static/vendor/katex/katex.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="app">

        <!-- ── Top bar: brand · sim dropdown · lang toggle ── -->
        <header class="top-bar">
            <div class="brand">
                <img id="app-logo" src="/static/logo.png" alt="ÚI AV ČR" onerror="this.style.display='none'">
                <div class="brand-text">
                    <div id="app-title" data-i18n="title">Z jednoduchého složité</div>
                    <div id="app-subtitle">ÚI AV ČR — Veletrh vědy 2026</div>
                </div>
            </div>

            <!-- Simulation dropdown (controls.js injects <select class="sim-select">) -->
            <div class="tabs" id="sim-tabs"></div>

            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="cs">CZ</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </header>

        <!-- ── Title block: editorial h1 + collapsible equation panel ── -->
        <section class="title-block">
            <div class="title-left">
                <div class="kicker"></div>
                <h1 class="app-headline"></h1>
                <div class="app-tagline"></div>
            </div>

            <div class="title-right">
                <div class="equation-panel">
                    <div class="eq-header" id="eq-header">
                        <span class="eq-header-title" data-i18n="eq_title">Jak to funguje — rovnice</span>
                        <span class="eq-chevron" id="eq-chevron">▼</span>
                    </div>
                    <div class="eq-body" id="eq-body">
                        <div id="eq-body-content"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── Stage: canvas + side column ── -->
        <section class="stage-row">
            <div class="canvas-col">
                <div class="canvas-wrapper">
                    <canvas id="simCanvas"></canvas>
                    <div class="canvas-meta">
                        <span class="live-dot"></span>
                        <span class="canvas-meta-label">LIVE</span>
                        <span id="canvas-sim-name" class="canvas-meta-sim"></span>
                    </div>
                </div>
                <div class="touch-hint" data-i18n="touch_hint">Klikněte na plátno a přidejte nové vzory</div>
            </div>

            <aside class="side-col">
                <!-- Description + Presets + Parameters + Colour schemes (all built by controls.js) -->
                <div id="sim-controls"></div>
            </aside>
        </section>

        <!-- ── Console: action buttons ── -->
        <footer class="console-row">
            <div class="kbd-hints">
                <span><kbd>R</kbd> reset</span>
                <span><kbd>P</kbd> pauza / pause</span>
                <span><kbd>S</kbd> pohlednice / postcard</span>
            </div>
            <div class="actions">
                <button class="action-btn btn-reset"    id="btn-reset"    data-i18n="reset"    data-key="R">⟲ Resetovat</button>
                <button class="action-btn btn-pause"    id="btn-pause"    data-i18n="pause"    data-key="P">⏸ Pauza</button>
                <button class="action-btn btn-snapshot" id="btn-snapshot" data-i18n="snapshot" data-key="S">◈ Pohlednice</button>
            </div>
        </footer>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- ── Application entry point (unchanged) ── -->
    <script type="module">
        import { registerSim, init } from "/static/js/core/engine.js";
        import rdSim from "/static/js/sims/reaction-diffusion.js";
        import oscSim from "/static/js/sims/kuramoto.js";
        import boidsSim from "/static/js/sims/boids.js";
        import neuralSim from "/static/js/sims/neural-criticality.js";

        const ALL_SIMS = { rd: rdSim, osc: oscSim, boids: boidsSim, neural: neuralSim };

        fetch("/api/config")
            .then(r => r.json())
            .then(cfg => {
                const lang = cfg.branding.default_lang || "cs";
                const title = lang === "en" ? cfg.branding.title_en : cfg.branding.title_cs;
                const titleEl = document.getElementById("app-title");
                const subtitleEl = document.getElementById("app-subtitle");
                if (titleEl && title) titleEl.textContent = title;
                if (subtitleEl && cfg.branding.subtitle) subtitleEl.textContent = cfg.branding.subtitle;

                const logoEl = document.getElementById("app-logo");
                const lightLogo = cfg.branding.logo_light_path;
                if (logoEl && lightLogo) {
                    logoEl.src = "/static/" + lightLogo.replace(/^static\//, "");
                    logoEl.style.filter = "none";
                }

                for (const id of cfg.simulations) {
                    if (ALL_SIMS[id]) {
                        registerSim(ALL_SIMS[id]);
                        if (cfg.content && cfg.content[id] && ALL_SIMS[id].applyContent) {
                            ALL_SIMS[id].applyContent(cfg.content[id]);
                        }
                    }
                }
                init(lang);
            })
            .catch(() => {
                for (const sim of Object.values(ALL_SIMS)) registerSim(sim);
                init();
            });
    </script>
</body>
</html>
