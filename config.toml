# =============================================================
#  Veletrh vědy 2026 — Configuration
# =============================================================
#  Edit this file to customise the app without touching any code.
#  Restart the server after saving for changes to take effect.
# =============================================================


# -------------------------------------------------------------
#  SIMULATIONS
#  Set enabled = true/false to show or hide each simulation tab.
#  The order here controls the tab order in the UI.
# -------------------------------------------------------------

[[simulations]]
id      = "rd"      # Reaction-Diffusion (Turing patterns)
enabled = true

[[simulations]]
id      = "osc"     # Kuramoto coupled oscillators (synchronisation)
enabled = true

[[simulations]]
id      = "boids"   # Boids flocking / crowd / predator-prey
enabled = true

[[simulations]]
id      = "neural"  # Neural criticality / brain avalanches
enabled = true

[[simulations]]
id      = "pendulum"   # Double-pendulum / deterministic chaos
enabled = true


# -------------------------------------------------------------
#  BRANDING — text shown in the UI sidebar
# -------------------------------------------------------------

[branding]
# Main title in the sidebar header (bold gold text)
title_cs = "Z jednoduchého složité"
title_en = "From Simple to Complex"

# Smaller sub-line below the title
subtitle = "Ústav Informatiky AV ČR"

# Default language on page load: "cs" or "en"
default_lang = "cs"


# -------------------------------------------------------------
#  POSTCARD — text on the printed PDF postcard
# -------------------------------------------------------------

[postcard]
# Postcard branding (Czech only)
footer_institution = "Ústav informatiky AV ČR"
qr_url             = "https://www.cs.cas.cz"

# Logo image path (relative to project root)
logo_path = "static/logo.png"

# Optional: path to a light/white version of the logo for the dark sidebar.
# If set, this image is used in the web app instead of logo_path.
# If empty (""), the app applies a CSS invert filter on logo_path automatically.
logo_light_path = ""

# Output directory for saved postcards (relative to project root)
output_dir = "postcards"

# Physical page size for the PDF:
#   "6x4"  — standard postcard (6x4 inches), 300 DPI = 1800x1200 px
#   "A6"   — 148x105 mm
#   "A5"   — 210x148 mm
page_size = "6x4"

# Fraction of page height used by the simulation image (rest = footer)
art_fraction = 0.82


# =============================================================
#  SIMULATION CONTENT
#  Customise labels, descriptions, parameter names, equation
#  hints, and preset names for each simulation.
#  All fields support Czech (_cs) and English (_en) variants.
#  Leaving a field empty ("") keeps the built-in JS default.
# =============================================================

# -------------------------------------------------------------
#  REACTION-DIFFUSION (Turing patterns)
# -------------------------------------------------------------

[content.rd]
# Tab label
tab_cs = "Turingovy vzory"
tab_en = "Turing Patterns"

# Tagline (one punchy sentence shown under the tab headline)
tagline_cs = "Dvě látky, jedna reakce, nekonečné vzory. Stejná matematika jako na kůži leoparda."
tagline_en = "Two chemicals, one reaction, endless patterns. The same math as a leopard's coat."

# Short description shown below the tab (1–3 sentences, plain text)
desc_cs = "Dvě jednoduchá pravidla míchání — a najednou vzniknou leopardí skvrny! Posuň posuvníky a sleduj, co se stane. Stejné rovnice vysvětlují vzory na kůži zvířat, mušlích i v korálových útesech."
desc_en = "Two simple mixing rules — and suddenly, leopard spots appear! Move the sliders and watch what happens. These same equations explain animal skin patterns, seashells, and coral reefs."

# Parameter labels (displayed next to each slider)
lbl_feed_rate_cs = "Přidávání látky (f)"
lbl_feed_rate_en = "Adding chemical (f)"
lbl_kill_rate_cs = "Odbourávání látky (k)"
lbl_kill_rate_en = "Removing chemical (k)"

# Equation parameter badge names and tooltips
# f
tip_f_name_cs = "= přidávání"
tip_f_name_en = "= feed"
tip_f_cs = "Kolik nové látky se neustále přilévá — jako když pouštíš vodu do vany. Zvyš → vzor se rozrůstá. Sniž → vzor se tenčí na tečky."
tip_f_en = "How much new stuff keeps flowing in — like running water into a bathtub. Raise → pattern grows. Lower → pattern thins into spots."
# k
tip_k_name_cs = "= odbourávání"
tip_k_name_en = "= removal"
tip_k_cs = "Jak rychle látka mizí — jako když voda odtéká odtokem. Zvyš → tečky se rozpouští. Sniž → tečky splývají do pruhů."
tip_k_en = "How fast stuff disappears — like water draining out. Raise → dots dissolve. Lower → dots merge into stripes."
# Du (fixed, labelled in badge)
tip_Du_name_cs = "šíření látky 1"
tip_Du_name_en = "spread of chem. 1"
tip_Du_cs = "Jak rychle se první látka rozlévá do okolí (tuto hodnotu nelze měnit)"
tip_Du_en = "How fast the first chemical spreads to its surroundings (this value is fixed)"
# Dv (fixed, labelled in badge)
tip_Dv_name_cs = "šíření látky 2"
tip_Dv_name_en = "spread of chem. 2"
tip_Dv_cs = "Jak rychle se druhá látka rozlévá — pomaleji než první, a právě to vytváří vzory! (nelze měnit)"
tip_Dv_en = "How fast the second chemical spreads — slower than the first, and that's what creates patterns! (fixed)"

# Preset names
preset_labyrinth_cs = "Labyrint"
preset_labyrinth_en = "Labyrinth"
preset_spots_cs     = "Skvrny"
preset_spots_en     = "Spots"
preset_waves_cs     = "Vlny"
preset_waves_en     = "Waves"
preset_worms_cs     = "Červi"
preset_worms_en     = "Worms"
preset_coral_cs     = "Korál"
preset_coral_en     = "Coral"
preset_mitosis_cs   = "Mitóza"
preset_mitosis_en   = "Mitosis"
preset_fingerprints_cs = "Otisky prstů"
preset_fingerprints_en = "Fingerprints"

# Postcard snapshot strings
snap_title_cs = "Turingovy vzory"
snap_title_en = "Turing Patterns"
snap_sub_cs   = "Tento vzor ještě nikdy neexistoval — dokud jsi ho nevytvořil."
snap_sub_en   = "You made a pattern that has never existed before."

# Level-A explanation panel
explain_a_cs = "Dvě neviditelné chemikálie zápolí o prostor — jedna se šíří rychle, druhá pomalu. Tenhle rozdíl v rychlosti vytesává vzor. Přidej poruchu kliknutím: tvá stopa se neroztratí — rozroste se do nového vzoru, někdy do vlny, někdy do spirály. Stejný typ chemického souboje tvoří pruhy na kůži zebry a tečky na kůži jaguára."
explain_a_en = "Two invisible chemicals are fighting over territory — one spreads fast, one spreads slow. That speed difference carves the pattern. Click to add a disturbance: your trace doesn't fade — it grows into a new pattern, sometimes a wave, sometimes a spiral. This same type of competition makes zebra stripes and jaguar spots."
explain_b_cs = "Systém reakce a difúze: dvě chemikálie reagují a šíří se různou rychlostí. Rychlejší hraje roli inhibitoru — brání vzniku svých sousedů. Proto se vzor pravidelně rozmisťuje. Alan Turing popsal tento mechanismus v roce 1952, dvacet let před prvním experimentálním důkazem."
explain_b_en = "A reaction–diffusion system: two chemicals react and diffuse at different speeds. The faster one acts as an inhibitor, suppressing its own kind nearby. That's why the pattern spaces itself evenly. Alan Turing described this in 1952, twenty years before experimental confirmation."
explain_c_cs = "Gray-Scottův model s parametry f (přísun) a k (odbourávání). Poměr difuzivit D_u/D_v = 2 vyvolává Turingovu nestabilitu. Zobrazený režim leží blízko hranice přechod tečky-labyrint. Biologické realizace: pigmentace kůže (Kondo & Miura 2010), rozestup prstů v embryogenezi."
explain_c_en = "Gray-Scott model with parameters f (feed) and k (kill). Diffusivity ratio D_u/D_v = 2 triggers Turing instability. The shown regime sits near the spot–labyrinth transition. Biological realisations: skin pigmentation (Kondo & Miura 2010), digit spacing in embryogenesis."

[content.rd.preset_params]
# Keys match the i18nLabel suffix (e.g. "preset_labyrinth" → "labyrinth")
# Values are inline tables of parameter overrides. Must match control IDs in reaction-diffusion.js.
labyrinth = { f = 0.037, k = 0.060 }
spots     = { f = 0.035, k = 0.065 }
waves     = { f = 0.014, k = 0.054 }
worms     = { f = 0.046, k = 0.063 }
coral     = { f = 0.025, k = 0.060 }
mitosis      = { f = 0.028, k = 0.062 }
fingerprints = { f = 0.040, k = 0.058 }


# -------------------------------------------------------------
#  KURAMOTO OSCILLATORS (Synchronisation)
# -------------------------------------------------------------

[content.osc]
# Tab label
tab_cs = "Synchronizace"
tab_en = "Synchronisation"

# Tagline
tagline_cs = "Tisíce světýlek, jedno pravidlo: sladit se se sousedy."
tagline_en = "Thousands of lights, one rule: match your neighbours."

# Short description
desc_cs = "Tisíce blikajících světýlek, každé s jediným pravidlem: přizpůsob se sousedům. Z toho vznikají spirály, vlny i chaos! Zvyš propojení a sleduj, jak se sladí. Stejný princip synchronizuje tleskání publika, blikání světlušek i buňky srdce."
desc_en = "Thousands of blinking lights, each with one simple rule: match your neighbours. That creates spirals, waves, and chaos! Increase the connection and watch them sync up. The same rule synchronises fireflies, heart cells, and audience clapping."

# Parameter labels
lbl_coupling_cs    = "Síla propojení (K)"
lbl_coupling_en    = "Connection strength (K)"
lbl_freq_spread_cs = "Rozdíly v tempu"
lbl_freq_spread_en = "Tempo differences"
lbl_base_freq_cs   = "Základní tempo (ω)"
lbl_base_freq_en   = "Base tempo (ω)"

# Equation parameter badge names and tooltips
# K
tip_K_name_cs    = "= propojení"
tip_K_name_en    = "= connection"
tip_K_cs         = "Jak moc sousední světýlka ovlivňují jedno druhé — čím víc, tím spíš začnou blikat společně. Posuň doprava → všechna světla se sladí do jednoho rytmu."
tip_K_en         = "How much neighbouring lights influence each other — the more, the sooner they blink together. Slide right → all lights lock into one rhythm."
# ω
tip_omega_name_cs   = "= tempo"
tip_omega_name_en   = "= tempo"
tip_omega_cs        = "Jak rychle světýlka blikají sama od sebe, bez vlivu sousedů. Zvyš → bliká rychleji (globálně)."
tip_omega_en        = "How fast each light blinks on its own, without any neighbours. Raise → everything flashes faster."
# σ (spread)
tip_spread_name_cs  = "= rozdíly"
tip_spread_name_en  = "= differences"
tip_spread_cs       = "Jak moc se liší tempo jednotlivých světýlek — malý rozdíl = snáz se sladí. Víc rozdílů = těžší synchronizace."
tip_spread_en       = "How different the blinking speeds are — small difference = easier to synchronise. More spread = harder to synchronise."

# Preset names
preset_spiral_cs     = "Spirálové vlny"
preset_spiral_en     = "Spiral waves"
preset_chimera_cs    = "Chiméra (polovina nesync)"
preset_chimera_en    = "Chimera (half unsync)"
preset_sync_cs       = "Plná synchronizace"
preset_sync_en       = "Full sync"
preset_turbulence_cs = "Turbulence"
preset_turbulence_en = "Turbulence"
preset_slow_sync_cs  = "Pomalá synchronizace"
preset_slow_sync_en  = "Slow sync"

# Postcard snapshot strings
snap_title_cs = "Synchronizace oscilátorů"
snap_title_en = "Synchronisation Dynamics"
snap_sub_cs   = "Jedno jednoduché pravidlo, tisíckrát zopakované, vytvořilo něco krásného."
snap_sub_en   = "A simple rule, repeated a thousand times, made something beautiful."

# Level-A explanation panel
explain_a_cs = "Každé světlo bliká vlastním rytmem — trochu rychleji, trochu pomaleji. Posuvník 'Síla propojení' určuje, jak moc každé světlo kopíruje sousedy. Pod určitou hodnotou: každý si jde svou cestou. Nad ní: všechna světla se synchronizují, bez dirigenta. Tak bije tvoje srdce — tisíce buněk s různým tempem se seřídí na jeden úder."
explain_a_en = "Each light flashes at its own natural rhythm — slightly faster or slower. The 'Connection strength' slider controls how much each light copies its neighbours. Below a threshold: chaos. Above it: all lights suddenly synchronise with no conductor. This is how your heart beats — thousands of cells with different natural rates locking into one rhythm."
explain_b_cs = "Každý oscilátor má vlastní přirozenou frekvenci z rozdělení. Pod kritickou silou vazby: fázové rozdíly rostou — nesoudržnost. Nad ní: makroskopická část oscilátorů se uzamkne do společné frekvence. Jedná se o fázový přechod: není to plynulý přechod, ale náhlý vznik řádu."
explain_b_en = "Each oscillator has its own natural frequency from a distribution. Below critical coupling: phase differences grow — incoherence. Above it: a macroscopic fraction locks to a shared frequency. This is a phase transition: not gradual, but a sudden onset of order."
explain_c_cs = "Kuramotův model na 2D mřížce s vazbou jen k nejbližším sousedům. Parametr řádu r = |⟨e^{iθ}⟩| měří fázovou koherenci. Kritická vazba K_c ≈ 2/(π·g(0)), kde g je rozdělení frekvencí. Dotyk injektuje spirálovou vlnu (fázový gradient); supercritický režim ji udrží, subkritický absorbuje."
explain_c_en = "Kuramoto model on a 2D lattice, nearest-neighbour coupling. Order parameter r = |⟨e^{iθ}⟩| measures phase coherence. Critical coupling K_c ≈ 2/(π·g(0)) where g is the frequency distribution. Touch injects a spiral via phase gradient; supercritical holds it, subcritical absorbs it."

[content.osc.preset_params]
# K = coupling strength, spread = frequency spread, omega = mean frequency
spiral     = { K = 1.5, spread = 0.4, omega = 0.6 }
chimera    = { K = 0.5, spread = 0.8, omega = 0.6 }
sync       = { K = 3.0, spread = 0.2, omega = 0.4 }
turbulence = { K = 0.2, spread = 0.6, omega = 0.8 }
slow_sync  = { K = 1.8, spread = 0.3, omega = 0.5 }


