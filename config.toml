eq_note_en = "Each individual only perceives its nearest neighbours — yet together they produce patterns no individual planned."

# Preset names
preset_murmuration_cs = "Ptačí hejno"
preset_murmuration_en = "Murmuration"
preset_school_cs      = "Hejno ryb"
preset_school_en      = "Fish school"
preset_predator_cs    = "Útěk před predátorem"
preset_predator_en    = "Predator panic"
preset_crowd_cs       = "Proudění davu"
preset_crowd_en       = "Crowd flow"
preset_chaos_cs       = "Chaos"
preset_chaos_en       = "Chaos"

# Postcard snapshot strings
snap_title_cs = "Hejna"
snap_title_en = "Flocking"
snap_sub_cs   = "Tisíc jedinců. Žádný velitel. Jeden pohyb."
snap_sub_en   = "A thousand individuals. Zero leaders. One movement."

# Level-A explanation panel
explain_a_cs = "Každá tečka zná jen tři pravidla: drž se blízkých, nesrážej se, koukej stejným směrem jako soused. Žádný vůdce, žádný plán — a přesto celé hejno letí jako jeden organismus. Přetáhni 'Dosah vnímání' doleva: hejno se rozpadne. Zpátky doprava: zase se sejde. Stejnou logikou se řídí vaše imunitní buňky."
explain_a_en = "Each dot knows only three rules: stay close, avoid collisions, face the same way as your neighbours. No leader, no plan — yet the whole flock moves as one. Drag 'Perception range' left: the flock falls apart. Back right: it reforms. Your immune cells use the same logic to hunt bacteria."
explain_b_cs = "Reynoldsův model z roku 1987: tři místní pravidla (separace, zarovnání, soudržnost) produkují globální koordinaci bez centrálního řízení. Klíčový rys emergence: žádná ze složek nemá mapu celku. Podobné modely popisují pohyb hejn špačků, hejn sardinek i mraveniště."
explain_b_en = "Reynolds' 1987 model: three local rules (separation, alignment, cohesion) produce global coordination without central control. A textbook case of emergence: no component holds the global picture. Similar models describe starling murmurations, sardine schools, ant colonies."
explain_c_cs = "1024 agentů na GPU (32×32 textura). Každý krok: N² skenování sousedů s váženými vektory tří sil, omezení na maximální rychlost a sílu. Predátor-režim přidá antagonistu s jinou cílovou funkcí. Model je prototyp skupinové robotiky a davové simulace."
explain_c_en = "1024 GPU agents (32×32 texture). Each step: N² neighbour scan with weighted vectors from the three forces, clamped to max speed and force. Predator mode adds an antagonist with a different objective. The model is a prototype for swarm robotics and crowd simulation."

