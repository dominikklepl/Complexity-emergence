# -------------------------------------------------------------
# Neural Criticality
# -------------------------------------------------------------

[content.neural]
# Tab label
tab_cs = "Mozková aktivita"
tab_en = "Neural Criticality"

# Tagline
tagline_cs = "Příliš málo: ticho. Příliš mnoho: záchvat. Přesně na hraně: kaskády všech velikostí."
tagline_en = "Too little: silence. Too much: seizure. Exactly at the edge: cascades of every size."

# Short description
desc_cs = "Sniž propojení: síť zticí. Zvyš ho příliš: aktivita se nekontrolovaně šíří celou sítí. Přesně mezi těmito stavy vznikají kaskády ve všech velikostech — bez typického měřítka. Posuň 'Propojení' a sleduj přechod."
desc_en = "Decrease connectivity: the network falls silent. Increase it too far: activity spreads uncontrollably across the whole network. Exactly between these states, cascades emerge at every scale — with no characteristic size. Slide 'Connectivity' and watch the transition."

# Slider labels
lbl_spread_cs = "Propojení (σ)"
lbl_spread_en = "Connectivity (σ)"
lbl_input_cs  = "Pozadí (ε)"
lbl_input_en  = "Background noise (ε)"
lbl_leak_cs   = "Paměť (1−λ)"
lbl_leak_en   = "Memory (1−λ)"

# Parameter tooltips
# σ (connectivity)
tip_sigma_name_cs = "= propojení"
tip_sigma_name_en = "= connectivity"
tip_sigma_cs = "Jak silně neuron nabudí své sousedy, když sám vystřelí. Zvyš → vlny se rozrůstají. Sniž → ticho."
tip_sigma_en = "How strongly a firing neuron excites its neighbours. Raise → cascades grow. Lower → silence."
# ε (background noise)
tip_eps_name_cs = "= pozadí"
tip_eps_name_en = "= background"
tip_eps_cs = "Kolik spontánních výbojů vzniká samo od sebe. Zvyš → víc lavin začíná."
tip_eps_en = "How many spontaneous sparks arise. Raise → more avalanches start."
# λ (memory / leak)
tip_lambda_name_cs = "= paměť"
tip_lambda_name_en = "= memory"
tip_lambda_cs = "Jak dlouho si neuron pamatuje předchozí nabuzení. Vyšší paměť → delší dozvuky."
tip_lambda_en = "How long a neuron remembers past charge. Higher memory → longer echoes."

# Preset names
preset_critical_cs = "Kritický bod"
preset_critical_en = "Critical point"
preset_seizure_cs  = "Záchvat"
preset_seizure_en  = "Seizure"
preset_silence_cs  = "Ticho"
preset_silence_en  = "Silence"

# Postcard snapshot strings
snap_title_cs = "Mozková aktivita"
snap_title_en = "Neural Criticality"
snap_sub_cs   = "Tvůj mozek, na hraně mezi tichem a bouří."
snap_sub_en   = "Your brain, on the edge between silence and storm."

# Level-A explanation panel
explain_a_cs = "Na kritickém bodě nemají laviny aktivity žádnou typickou velikost — vznikají malé i velké napříč všemi měřítky. Modely předpovídají, že systém bez typické škály dokáže reagovat na slabé i silné podněty stejně dobře. Příliš daleko od kritického bodu tato vlastnost mizí — systém buď ignoruje slabé signály, nebo se přetíží silnými. Kritický bod není náhodný — modely předpovídají, že maximalizuje dynamický rozsah."
explain_a_en = "At the critical point, activity avalanches have no characteristic size — small and large ones occur across all scales. Models predict that a system with no typical scale responds equally well to weak and strong inputs. Move away from criticality in either direction and this property is lost — the system either ignores weak signals or gets overwhelmed by strong ones. The edge is not incidental — models predict it maximises dynamic range."
explain_b_cs = "Samoorganizovaná kritičnost (SOC): síť neuronů naladěná na přechod mezi útlumem a explozí. Na kritickém bodě se velikosti lavin řídí mocninným rozdělením — žádná typická velikost. Takový stav maximalizuje rozsah reakcí, které mozek zvládne: jemné i hrubé podněty."
explain_b_en = "Self-organised criticality (SOC): a neural network tuned to the edge between quiescence and runaway activity. At the critical point, avalanche sizes follow a power law — no typical scale. This maximises the range of responses the brain can produce: subtle to dramatic."
explain_c_cs = "Beggs & Plenz (2003) model neuronové lavinové dynamiky. Stav: R=náboj, G=refrakterní fáze, B=stopa. Deterministický hash generuje dalekodosahová spojení — topologie malého světa. Při σ ≈ 1 (subkritická vazba upravená pro síť) leží systém na hranici; exponent velikostí lavin α ≈ −3/2 je univerzální."
explain_c_en = "Beggs & Plenz (2003) neuronal avalanche model. State: R=charge, G=refractory, B=trail. Deterministic hash seeds long-range links — small-world topology. Near σ ≈ 1 (network-adjusted coupling) the system sits at criticality; avalanche size exponent α ≈ −3/2 is universal."

