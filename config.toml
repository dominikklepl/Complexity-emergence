# Short description
desc_cs = "Tři jednoduchá pravidla — nesrážej se, leť stejným směrem, drž se blízko skupiny — a vznikne hejno, jako u ptáků nebo ryb. Klikni levým tlačítkem pro přitahování, pravým pro odpuzování. Hejna špačků a hejna sardinek fungují přesně stejně — bez velitele."
desc_en = "Three simple rules — don't crash, fly the same way, stay close to the group — and a flock emerges, just like birds or fish. Left-click to attract, right-click to repel. Starling murmurations and sardine bait balls emerge from exactly these rules, with no leader."

