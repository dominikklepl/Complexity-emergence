# "Jak to funguje?" panel — two paragraphs (HTML allowed for <strong> etc.)
eq_para1_cs = "Dvě ramena spojená v sérii — každé ovlivňuje pohyb toho druhého. Kyvadla lišící se o zlomek stupně se zpočátku pohybují skoro shodně, pak se jejich dráhy začnou exponenciálně rozcházet."
eq_para1_en = "Two arms linked in series — each drives the motion of the other. Pendulums differing by a fraction of a degree start nearly in sync, then their paths begin to diverge exponentially."

eq_para2_cs = "Žádná náhoda, žádná chyba ve výpočtu — pouze nevyhnutelný důsledek toho, že malé rozdíly se v nelineárním systému zesilují. I měření přesné na 0,0001 stupně nestačí: chyba se exponenciálně zvětší a předpověď selže. Stejný princip limituje předpovídání počasí — rovnice atmosféry jsou známé, přesná předpověď na týdny dopředu přesto není možná."
eq_para2_en = "No randomness, no computational error — just the unavoidable consequence of small differences amplifying in a nonlinear system. Even a measurement precise to 0.0001 degrees is not enough: the error grows exponentially and the prediction fails. The same principle limits weather forecasting — the equations of atmospheric dynamics are known, yet accurate prediction weeks ahead remains out of reach."
