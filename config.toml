predator    = { mode = "predator", separation = 2.0, alignment = 0.8, cohesion = 1.5, perception = 0.12, maxSpeed = 0.006, trailPersistence = 0.94 }
crowd       = { mode = "crowd",    separation = 2.5, alignment = 0.3, cohesion = 0.2, perception = 0.05, maxSpeed = 0.003, trailPersistence = 0.90 }
chaos       = { mode = "boids",    separation = 0.3, alignment = 0.2, cohesion = 0.1, perception = 0.15, maxSpeed = 0.008, trailPersistence = 0.85 }

# -------------------------------------------------------------
# Neural Criticality
# -------------------------------------------------------------

[content.neural]
# Tab label
tab_cs = "Mozková aktivita"
tab_en = "Neural Criticality"

# Short description
desc_cs = "Váš mozek žije na hraně. Příliš málo propojení: ticho. Příliš mnoho: záchvat. Přesně na kritickém bodě mezi nimi vznikají laviny aktivity ve všech velikostech — a právě tam mozek pracuje nejlépe. Posuňte propojení a sledujte přechod."
desc_en = "Your brain lives on the edge. Too little connection: silence. Too much: seizure. At the critical point between them, cascades of activity appear in all sizes — and that's where the brain works best. Adjust connectivity and watch the transition."

# Slider labels
lbl_spread_cs = "Propojení (σ)"
lbl_spread_en = "Connectivity (σ)"
lbl_input_cs  = "Pozadí (ε)"
lbl_input_en  = "Background noise (ε)"
lbl_leak_cs   = "Paměť (1−λ)"
lbl_leak_en   = "Memory (1−λ)"

# Preset names
preset_critical_cs = "Kritický bod"
preset_critical_en = "Critical point"
preset_seizure_cs  = "Záchvat"
preset_seizure_en  = "Seizure"
preset_silence_cs  = "Ticho"
preset_silence_en  = "Silence"
preset_cascade_cs  = "Vlna"
preset_cascade_en  = "Wave"

# Postcard snapshot strings
snap_title_cs = "Mozková aktivita"
snap_title_en = "Neural Criticality"
snap_sub_cs   = "Váš mozek, na hraně mezi tichem a bouří."
snap_sub_en   = "Your brain, on the edge between silence and storm."

# Level-A explanation panel
explain_a_cs = "Tvůj mozek žije na hraně. Příliš málo propojení: ticho. Příliš mnoho: záchvat. Přesně na kritickém bodě mezi nimi vznikají laviny aktivity ve všech velikostech. Tam mozek pracuje nejlépe. Posuň 'Propojení' a sleduj přechod."
explain_a_en = "Your brain lives on the edge. Too little connectivity: silence. Too much: seizure. At the critical point between them, avalanches of activity appear in all sizes. That is where the brain works best. Drag 'Connectivity' and watch the transition."

[content.neural.preset_params]
# spread = connectivity σ, input = background noise ε, leak = charge decay λ
critical = { spread = 0.28, input = 0.012, leak = 0.008 }
seizure  = { spread = 0.38, input = 0.015, leak = 0.005 }
silence  = { spread = 0.09, input = 0.002, leak = 0.050 }
cascade  = { spread = 0.32, input = 0.008, leak = 0.005 }
