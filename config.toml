tagline_en = "Three rules. No map. Still one movement."

# Short description
desc_cs = "Každý agent vidí jen své nejbližší sousedy — žádný nemá přehled o celku. A přesto skupina vytváří koordinovaný pohyb. Sniž 'Dosah vnímání': koordinace se rozpadne — přímý důkaz, že globální struktura závisí čistě na lokální informaci."
desc_en = "Each agent sees only its immediate neighbours — none has any view of the whole. Yet the group produces coordinated movement. Decrease 'Perception range': coordination collapses — direct evidence that global structure depends entirely on local information."

# Mode selector label
lbl_mode_cs = "Režim"
lbl_mode_en = "Mode"

# Mode option labels
lbl_mode_boids_cs    = "Hejno"
lbl_mode_boids_en    = "Flocking"
lbl_mode_crowd_cs    = "Dav"
lbl_mode_crowd_en    = "Crowd"
lbl_mode_predator_cs = "Predátor"
lbl_mode_predator_en = "Predator"

# Slider labels
lbl_separation_cs = "Separace"
lbl_separation_en = "Separation"
lbl_alignment_cs  = "Zarovnání"
lbl_alignment_en  = "Alignment"
lbl_cohesion_cs   = "Soudržnost"
lbl_cohesion_en   = "Cohesion"
lbl_perception_cs = "Vzdálenost od sousedů"
lbl_perception_en = "Perception range"
lbl_max_speed_cs  = "Max. rychlost"
lbl_max_speed_en  = "Max speed"
lbl_trail_cs      = "Stopa"
lbl_trail_en      = "Trail"

# Equation section: intro sentence
eq_intro_cs = "Každý agent reaguje pouze na své blízké sousedy pomocí tří sil:"
eq_intro_en = "Each agent reacts only to nearby neighbours via three forces:"

# Equation force label + description (label — desc)
eq_sep_label_cs = "Separace"
eq_sep_label_en = "Separation"
eq_sep_desc_cs  = "nesrážej se"
eq_sep_desc_en  = "avoid collisions"

eq_ali_label_cs = "Zarovnání"
eq_ali_label_en = "Alignment"
eq_ali_desc_cs  = "leť stejným směrem"
eq_ali_desc_en  = "match heading"

eq_coh_label_cs = "Soudržnost"
eq_coh_label_en = "Cohesion"
