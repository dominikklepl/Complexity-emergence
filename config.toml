# -------------------------------------------------------------
# Neural Criticality
# -------------------------------------------------------------

[content.neural]
# Tab label
tab_cs = "Mozková aktivita"
tab_en = "Neural Criticality"

# Tagline
tagline_cs = "Mozek na hraně mezi tichem a bouří — právě tam zvládne zpracovat jak šepot, tak bouři."
tagline_en = "The brain, on the edge of silence and storm — where it can process both a whisper and a thunderclap."

# Short description
desc_cs = "Tvůj mozek žije na hraně. Příliš málo propojení: ticho. Příliš mnoho: lavina se nezastaví — mozek „hoří” jako při záchvatu. Přesně na kritickém bodě mezi nimi vznikají laviny aktivity ve všech velikostech — a právě tam zvládne zpracovat jak šepot, tak bouři. Posuň propojení a sleduj přechod."
desc_en = "Your brain lives on the edge. Too little connection: silence. Too much: the avalanche never stops — the brain 'runs away' like in a seizure. At the critical point between them, cascades of activity appear in all sizes — and that's where it can process both a whisper and a thunderclap. Adjust connectivity and watch the transition."

